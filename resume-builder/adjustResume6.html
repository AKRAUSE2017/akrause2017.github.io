        <h1 style="text-align: center; padding: 3vh;">Adjust Template</h1>
        <div class="row">
          <div class="col-lg-10" style="margin-left: auto; margin-right: auto;">
            <form onsubmit="saveInfo(); return false" role="form" class="">
              <!--personal information-->
              <h3 style="text-align: center; padding-bottom: 2vh;">Personal Information</h3>

              <div class="form-row">
                <div class="col form-group">
                  <input type="text" class="form-control" name="firstName" id="firstName" placeholder="First Name" required/>
                  <div class="validate"></div>
                </div>
                <div class="col form-group">
                  <input type="text" class="form-control" name="lastName" id="lastName" placeholder="Last Name" required/>
                  <div class="validate"></div>
                </div>
              </div>

              <div class="form-group">
                <input type="text" class="form-control" name="city" id="city" placeholder="City" required/>
                <div class="validate"></div>
              </div>

              <div class="form-group">
                <input type="text" class="form-control" name="phoneNumber" id="phoneNumber" placeholder="Phone Number" required/>
                <div class="validate"></div>
              </div>

              <div class="form-group" style="padding-bottom: 2vh;">
                <input type="text" class="form-control" name="email" id="email" placeholder="Email Address" required />
                <div class="validate"></div>
              </div>

              <div class="form-group">
                <textarea style="resize: none;" class="form-control" id="summary" name="summary" rows="5" maxlength = "300" placeholder="Summary" required></textarea>
                <div class="validate"></div>
              </div>

              <!--end of personal information-->
                
              <!--work experience-->
              <hr style="width:75%;">
              <h3 style="text-align: center; padding-bottom: 2vh;">Work Experience</h3>
              <div id="work1">
                <div class="form-row">
                  <div class="col form-group">
                    <input type="text" class="form-control" name="businessName" id="businessName1" placeholder="Business Name" required/>
                    <div class="validate"></div>
                  </div>
                </div>

                <div class="form-group">
                  <input type="text" class="form-control" name="jobPosition" id="jobPosition1" placeholder="Position" required />
                  <div class="validate"></div>
                </div>

                <div class="form-row">
                  <div class="col form-group">
                    <input type="text" class="form-control" name="dateStart" id="dateStart1" placeholder="Start Date" required/>
                    <div class="validate"></div>
                  </div>
                  <div class="col form-group">
                    <input type="text" class="form-control" name="dateEnd" id="dateEnd1" placeholder="End Date" required/>
                    <div class="validate"></div>
                  </div>
                </div>
              
                <div class="form-group" style="padding-bottom: 0px;">
                  <textarea class="form-control" style="resize: none;" style="resize: none;" id="jobDescription1" name="jobDescription" rows="5" maxlength = "300" placeholder="Description" required></textarea>
                  <div class="validate"></div>
                </div>
              </div>
              <div class="row" style="float:right;"><button type="button" onclick="addWork();">Add</button><button style="display: none;" id="removeBtnWork" type="button" onclick="removeWork();">Remove</button></div>
              <br>
              <br>
            <hr style="width:75%;">
            
            <!--end of work experience-->

            <!--education-->
            <h3 style="text-align: center; padding-bottom: 2vh;">Education</h3>
            <div id="school1">
              <div class="form-row">
                <div class="col form-group">
                  <input type="text" class="form-control" name="institution" id="institution1" placeholder="Institution" required/>
                  <div class="validate"></div>  
                </div>
              </div>
  
              <div class="form-group">
                <input type="text" class="form-control" name="educationDegree" id="educationDegree1" placeholder="Degree" required/>
                <div class="validate"></div>
              </div>

              <div class="form-row">
                <div class="col form-group">
                  <input type="text" class="form-control" name="dateEnroll" id="dateEnroll1" placeholder="Start Date" required/>
                  <div class="validate"></div>
                </div>
                <div class="col form-group">
                  <input type="text" class="form-control" name="dateGrad" id="dateGrad1" placeholder="End Date" required/>
                  <div class="validate"></div>
                </div>
              </div>
  
              <div class="form-group">
                <textarea style="resize: none;" class="form-control" id="educationDescription1" name="educationDescription" placeholder="Description" rows="5" maxlength = "300" required></textarea>
                <div class="validate"></div>
              </div>
            </div>
            <div class="row"style="float:right;"><button type="button" onclick="addSchool();">Add</button><button style="display: none;" id="removeBtnSchool" type="button" onclick="removeSchool();">Remove</button></div>
            <br>
            <br>
            <hr style="width:75%;">
            
            <!--end of education-->

            <!--Other -->
            <h3 style="text-align: center; padding-bottom: 2vh;">Other</h3>

            <div class="form-group" style="padding-top:0px;">

              <div class="validate"></div>
